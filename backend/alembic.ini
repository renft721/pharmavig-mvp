# Alembic Configuration

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be prepended with date and time
#file_template = %%(asctime)s_%%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current working directory
prepend_sys_path = .

# timezone to use when rendering the date
# within the "create date" string. Using an installed
# tzinfo object instance or a stdlib timezone class
# is recommended (acutally, it is the only recommened approach)
# Note that without this - the older sqlalchemy-migrate based migrations
# would be used. It should be the name of a pytz timezone name, e.g. US/Eastern.
# If left blank, the system local timezone is used.
sqlalchemy.url = driver://user:password@localhost/dbname

# The output encoding used when revision files
# are written from script.py.mako.
# Default is 'utf-8'
output_encoding = utf-8

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
